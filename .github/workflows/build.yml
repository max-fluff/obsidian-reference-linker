name: Build

# Runs the core tests, builds the plugin, and verifies the committed build artifacts match
# a fresh build, so a PR (or a push to main) can't land a stale bundle.
#
# Core only: CI guards what a change's author cannot see locally — the cross-plugin contract
# and whether the bundle loads. The behaviour tests run with `npm test`, because behaviour is
# what most commits are meant to change.
#
# Identical in all four linker plugins. It cannot live in the submodule — GitHub only reads
# workflows from the repository itself — so keep the four copies byte-identical by hand.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run test:core
      - run: npm run build

      # styles.css is generated too — the build stamps the version into it — so checking
      # main.js alone would let a stale stylesheet ship unnoticed.
      - name: Verify the built files are in sync with src/
        run: |
          if ! git diff --exit-code -- main.js styles.css; then
            echo "::error::main.js or styles.css is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi
