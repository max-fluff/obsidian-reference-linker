name: Build

# Runs the tests, builds the plugin, and verifies the committed main.js matches a fresh
# build of src/, so a PR (or a push to main) can't land a stale bundle.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify main.js is in sync with src/
        run: |
          if ! git diff --exit-code -- main.js; then
            echo "::error::main.js is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi
